<svg
  width="480"
  height="160"
  viewBox="0 0 480 160"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Brand Symbol (Big G + Gold Arrow) -->
  <g transform="translate(10, 10)">
    <!-- Circular Text Outline: "Get Loans Hub" -->
    <path
      id="circularPath"
      d="M 15,62 A 42,42 0 0,1 98,62"
      fill="none"
      stroke="none"
    />
    <text font-family="sans-serif" font-weight="700" font-size="10" fill="#1F2937">
      <textPath href="#circularPath" startOffset="50%" text-anchor="middle">
        Get Loans Hub
      </textPath>
    </text>

    <!-- Large Forest Green "G" -->
    <path
      d="M 85,42 C 80,32 70,25 56,25 C 34,25 20,44 20,68 C 20,91 34,110 56,110 C 72,110 82,100 85,88 L 56,88 L 56,72 L 102,72 C 103,77 104,82 104,88 C 104,118 82,128 56,128 C 24,128 2,102 2,68 C 2,34 24,8 56,8 C 76,8 93,17 101,32 Z"
      fill="#1B4D22"
    />

    <!-- Swooping Gold/Orange Gradient Arrow -->
    <defs>
      <linearGradient id="arrowGradient" x1="12" y1="122" x2="88" y2="52" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#EA580C" />
        <stop offset="100%" stop-color="#F59E0B" />
      </linearGradient>
    </defs>
    <path
      d="M 12,122 C 32,102 52,92 72,92 C 82,92 88,96 92,102 M 92,102 L 72,82 M 92,102 L 98,72 C 92,62 82,52 68,52 M 68,52 L 88,72"
      stroke="url(#arrowGradient)"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />
    <path
      d="M 76,52 L 102,68 L 96,38 Z"
      fill="url(#arrowGradient)"
    />
  </g>

  <!-- Brand Typography -->
  <!-- "Get Loans Hub" main serif green text -->
  <text
    x="145"
    y="80"
    fill="#1B4D22"
    font-family="Georgia, serif"
    font-weight="900"
    font-size="44"
  >Get Loans Hub</text>

  <!-- Tagline "One Step Closer to your Dream" -->
  <text
    x="150"
    y="112"
    fill="#111827"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="20"
  >One Step Closer to your Dream</text>

  <!-- Bottom Accent Stripe: "We provide the best loan services across india" -->
  <rect
    x="10"
    y="132"
    width="460"
    height="20"
    fill="#1B4D22"
    rx="3"
  />
  <text
    x="240"
    y="146"
    fill="#FFFFFF"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="11"
    text-anchor="middle"
    letter-spacing="0.5"
  >We provide the best loan services across india</text>
</svg>
